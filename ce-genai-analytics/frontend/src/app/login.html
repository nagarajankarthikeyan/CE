<div class="login-page">
  <div class="login-card">
    <div class="ce-brand">
      <img class="ce-logo" src="images/logo/constellation-logo.png" alt="Constellation logo" />
      
    </div>

    <h1>Welcome</h1>
    <p class="subhead">Sign in to continue to your analytics workspace.</p>

    <label for="username">Username</label>
    <input id="username" [(ngModel)]="username" placeholder="Username" />

    <label for="password">Password</label>
    <input id="password" [(ngModel)]="password" type="password" placeholder="Password" />

    <button (click)="login()">Sign In</button>

    <p *ngIf="loginError" class="error">
      Invalid credentials
    </p>
  </div>
</div>
